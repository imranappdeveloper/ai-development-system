# AI Development OS — project binding (portable — safe to commit)
version: 1.0.0
platform: AI Development OS
kickoff_mode: grill-first

project_name: {{PROJECT_NAME}}
work_id: WR-001

# Paths — do NOT use machine-specific absolute paths here.
# Each machine sets AI_DEV_OS_HOME in shell profile (install-cli.sh).
# Optional per-machine override: ai-dev-os.local.yaml (gitignored).
paths:
  ai_dev_os_home: env:AI_DEV_OS_HOME
  project_root: auto
  local_override: ai-dev-os.local.yaml

docs:
  kickoff: docs/PROJECT-KICKOFF.md
  bug_fix: docs/BUG-FIX.md
  os_footer: docs/OS-STATUS-FOOTER.md
  user_flow: docs/USER-FLOW.md
  requirement_check: docs/REQUIREMENT-CHECK.md
  standalone: docs/STANDALONE.md

skills:
  manifest: skills/MANIFEST.yaml
  load_from: env:AI_DEV_OS_HOME/skills/

start_commands:
  - /setup-ads
  - setup ads
  - start
  - new project
  - kickoff
setup_ads_ref: docs/SETUP-ADS.md

bug_fix_commands:
  - "Bug Fix:"
  - "bug:"
  - "fix:"