# Telemetry event schema — work/telemetry/events.jsonl (one JSON object per line)
# Anonymized rollup: $AI_DEV_OS_HOME/.usage/rollup.jsonl (no proprietary text)

version: "1.0"

event_types:
  - skill_invoked
  - os_footer
  - grill_question
  - milestone_snapshot
  - observe_run_start
  - observe_run_end
  - observe_heartbeat
  - run_start
  - run_end
  - step_start
  - step_end
  - heartbeat
  - tool_call
  - subagent_spawn
  - script_invoked
  - files_used
  - mcp_probe
  - mcp_call
  - daemon_status
  - resolve_screen

fields:
  ts: ISO-8601 UTC
  event_type: string
  milestone: grill | tasks-published | afk-run | null
  skill: string | null
  project_slug: basename of project root (rollup only)
  duration_sec: integer | null
  run_id: string | null
  parent_run_id: string | null
  step: string | null
  step_index: string | null
  issue: integer | null
  agent: grok | agy | null
  status: ok | fail | skip | null
  tokens_in: integer | null
  tokens_out: integer | null
  tokens_source: exact | estimated | null
  metrics:
    grill_questions: integer
    partial_footer_count: integer
    lock_doc_approved: boolean
    issues_published: integer
    prs_opened: integer
    needs_info_count: integer
    spec_review_retries: integer
    queued_at_start: integer
    afk_stalled: boolean
    task_run_crash: boolean
  anomalies: list of anomaly_id strings
  nudge: boolean

anomaly_ids:
  - afk_stall
  - needs_info
  - task_run_crash
  - grill_abandoned
  - partial_footer
  - grill_questions_high
  - spec_review_retry
  - afk_zero_prs