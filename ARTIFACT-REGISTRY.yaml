# Artifact type registry — machine SSOT
# Shapes: standards/ARTIFACT-CONTRACT.md (STD-ARTIFACT-001)
version: 1.0.0
status: active
updated: 2026-06-18

artifacts:
  INT:
    name: Intake Record
    template_id: TP-intake
    path_pattern: "{project_root}/work/intake/{work_id}.md"
    producer: PB-intake-classify
    phase: Intake
    gate: H-INTAKE

  WR:
    name: Work Record
    template_id: TP-WR
    path_pattern: "{project_root}/work/{work_id}.md"
    producers: [PB-intake-classify, PB-discovery-research, ORCH-PROJECT]
    phase: Meta
    gate: none

  ORS:
    name: Orchestrator Run State
    template_id: TP-ORS
    path_pattern: "{project_root}/work/orchestrator/{work_id}.ors.md"
