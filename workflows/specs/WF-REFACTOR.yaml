workflow_id: WF-REFACTOR
display_name: Refactor
aliases:
- Structural improvement
class: end_to_end
version: 1.0.0
status: active
updated: '2026-06-18'
owner: Workflow Owner
intake_work_types:
- refactor
phases_ref: ../WF-REFACTOR/phases.yaml
inputs:
  required:
  - id: IN-WF-01
    name: raw_request
    source: human
  - id: IN-WF-02
    name: project_root
    source: human
  - id: IN-WF-03
    name: context_md
    source: project
  optional: []
  prerequisites:
  - description: Existing codebase at project_root
outputs:
  primary_artifacts:
  - INT
  - ARCH
  wr_terminal_status: plan_approved
  ors_terminal_status: done
required_skills:
- skill_id: PB-intake-classify
  phase: Intake
  status_accept:
  - draft
  - active
  optional: false
- skill_id: PB-draft-architecture
  phase: Plan
  status_accept:
  - planned
  - draft
  - active
  optional: false
required_templates:
- TP-intake
- TP-WR
- TP-architecture
- TP-ORS
required_standards:
- STD-WF-001
- STD-ARTIFACT-001
- STD-NAMING-001
- STD-MEM-001
- STD-LOG-001
- STD-VER-001
- STD-TEST-001
- STD-REVIEW-001
- STD-ARCH-001
- STD-PERF-001
required_checklists:
- CL-INTAKE
- CL-ORCH
execution_sequence:
- PB-intake-classify
- H-INTAKE
- PB-draft-architecture
- H-PLAN
exit_criteria:
- ARCH approved at H-PLAN
- Refactor boundaries explicit in ARCH
quality_gates:
- id: G-WF-REF-01
  criterion: ARCH lists non-goals and module boundaries
failure_recovery:
- code: E-WF-PREFLIGHT
  trigger: Missing required input or artifact
  action: Human hold; list inputs.required
  rewind: null
- code: E-WF-GATE-REJECT
  trigger: Human reject at H-*
  action: ORS aborted or revise per gate
  rewind: prior phase
- code: E-WF-PLANNED
  trigger: Next skill status planned
  action: Block invoke; waiver or wait
  rewind: null
- code: E-WF-SKILL
  trigger: Playbook OUT-05 escalation
  action: ORCH recovery; max 3 retries
  rewind: null
human_approval:
- gate_id: H-INTAKE
  binds:
  - INT
  required: true
  skippable: false
  waivable_via: gates.yaml#waivable_gates
- gate_id: H-FRAME
  binds:
  - DISC
  required: true
  skippable: true
  waivable_via: gates.yaml#waivable_gates
- gate_id: H-PLAN
  binds:
  - ARCH
  required: true
  skippable: false
  waivable_via: gates.yaml#waivable_gates
