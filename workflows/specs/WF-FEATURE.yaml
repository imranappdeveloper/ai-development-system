workflow_id: WF-FEATURE
display_name: Feature
aliases:
- Feature delivery
class: end_to_end
version: 1.0.0
status: active
updated: '2026-06-18'
owner: Workflow Owner
intake_work_types:
- feature
phases_ref: ../WF-FEATURE/phases.yaml
inputs:
  required:
  - id: IN-WF-01
    name: raw_request
    source: human
  - id: IN-WF-02
    name: project_root
    source: human
  optional:
  - id: IN-WF-10
    name: context_md
    source: project
  prerequisites: []
outputs:
  primary_artifacts:
  - INT
  - DISC
  - PRD
  - ARCH
  - ISS-*
  - CODE
  - TEST-RPT
  - REVIEW
  - REL
  wr_terminal_status: shipped
  ors_terminal_status: done
required_skills:
- skill_id: PB-intake-classify
  phase: Intake
  status_accept:
  - draft
  - active
  optional: false
- skill_id: PB-discovery-research
  phase: Frame
  status_accept:
  - draft
  - active
  optional: false
- skill_id: PB-draft-prd
  phase: Plan
  status_accept:
  - planned
  - draft
  - active
  optional: false
- skill_id: PB-draft-architecture
  phase: Plan
  status_accept:
  - planned
  - draft
  - active
  optional: false
- skill_id: PB-decompose-issues
  phase: Decompose
  status_accept:
  - planned
  - draft
  - active
  optional: false
- skill_id: PB-implement
  phase: Implement
  status_accept:
  - planned
  - draft
  - active
  optional: false
- skill_id: PB-verify
  phase: Verify
  status_accept:
  - planned
  - draft
  - active
  optional: false
- skill_id: PB-review
  phase: Verify
  status_accept:
  - planned
  - draft
  - active
  optional: true
- skill_id: PB-prepare-release
  phase: Ship
  status_accept:
  - planned
  - draft
  - active
  optional: true
required_templates:
- TP-intake
- TP-WR
- TP-ORS
- TP-discovery
- TP-prd
- TP-architecture
- TP-feature
- TP-testing
- TP-review
- TP-release
required_standards:
- STD-WF-001
- STD-ARTIFACT-001
- STD-NAMING-001
- STD-MEM-001
- STD-LOG-001
- STD-VER-001
- STD-TEST-001
- STD-REVIEW-001
- STD-ARCH-001
- STD-PERF-001
required_checklists:
- CL-INTAKE
- CL-DISCOVERY
- CL-ORCH
execution_sequence:
- PB-intake-classify
- H-INTAKE
- PB-discovery-research
- H-FRAME
- PB-draft-prd
- PB-draft-architecture
- H-PLAN
- PB-decompose-issues
- H-DECOMPOSE
- PB-implement
- H-IMPLEMENT
- PB-verify
- PB-review
- H-VERIFY
- PB-prepare-release
- H-SHIP
exit_criteria:
- All required gates approved
- REL artifact if ship path taken
- ORS done
quality_gates:
- id: G-WF-05
  criterion: WF-FEATURE happy path documented in orchestrator test plan
failure_recovery:
- code: E-WF-PREFLIGHT
  trigger: Missing required input or artifact
  action: Human hold; list inputs.required
  rewind: null
- code: E-WF-GATE-REJECT
  trigger: Human reject at H-*
  action: ORS aborted or revise per gate
  rewind: prior phase
- code: E-WF-PLANNED
  trigger: Next skill status planned
  action: Block invoke; waiver or wait
  rewind: null
- code: E-WF-SKILL
  trigger: Playbook OUT-05 escalation
  action: ORCH recovery; max 3 retries
  rewind: null
- code: E-WF-REWIND-DISC
  trigger: requires_re_intake
  action: Rewind Intake
  rewind: Intake
human_approval:
- gate_id: H-INTAKE
  binds:
  - INT
  required: true
  skippable: false
  waivable_via: gates.yaml#waivable_gates
- gate_id: H-FRAME
  binds:
  - DISC
  required: true
  skippable: false
  waivable_via: gates.yaml#waivable_gates
- gate_id: H-PLAN
  binds:
  - PRD
  - ARCH
  required: true
  skippable: false
  waivable_via: gates.yaml#waivable_gates
- gate_id: H-DECOMPOSE
  binds:
  - ISS-*
  required: true
  skippable: false
  waivable_via: gates.yaml#waivable_gates
- gate_id: H-IMPLEMENT
  binds:
  - CODE
  required: true
  skippable: true
  waivable_via: gates.yaml#waivable_gates
- gate_id: H-VERIFY
  binds:
  - TEST-RPT
  - REVIEW
  required: true
  skippable: false
  waivable_via: gates.yaml#waivable_gates
- gate_id: H-SHIP
  binds:
  - REL
  required: true
  skippable: false
  waivable_via: gates.yaml#waivable_gates
