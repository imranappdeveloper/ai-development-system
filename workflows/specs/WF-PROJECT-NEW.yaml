workflow_id: WF-PROJECT-NEW
display_name: New Project
aliases:
- Greenfield
- Bootstrap
class: end_to_end
version: 1.0.0
status: active
updated: '2026-06-18'
owner: Workflow Owner
intake_work_types:
- new_project
phases_ref: ../WF-PROJECT-NEW/phases.yaml
inputs:
  required:
  - id: IN-WF-01
    name: raw_request
    source: human
    description: Unstructured project initiative
  - id: IN-WF-02
    name: project_root
    source: human
    description: Target repo path (may be empty greenfield)
  - id: IN-WF-03
    name: ai_dev_os_home
    source: session
    description: Global OS path
  optional:
  - id: IN-WF-10
    name: context_md
    source: project
    description: Early vision notes if repo exists
  prerequisites: []
outputs:
  primary_artifacts:
  - INT
  - DISC
  - PRD
  - ARCH
  - SCAFFOLD
  wr_terminal_status: plan_approved
  ors_terminal_status: done
required_skills:
- skill_id: PB-intake-classify
  phase: Intake
  status_accept:
  - draft
  - active
  optional: false
- skill_id: PB-discovery-research
  phase: Frame
  status_accept:
  - draft
  - active
  optional: false
- skill_id: PB-draft-prd
  phase: Plan
  status_accept:
  - planned
  - draft
  - active
  optional: false
- skill_id: PB-draft-architecture
  phase: Plan
  status_accept:
  - planned
  - draft
  - active
  optional: false
- skill_id: PB-bootstrap-project
  phase: Plan
  status_accept:
  - planned
  - draft
  - active
  optional: true
required_templates:
- TP-intake
- TP-WR
- TP-ORS
- TP-discovery
- TP-prd
- TP-architecture
required_standards:
- STD-WF-001
- STD-ARTIFACT-001
- STD-NAMING-001
- STD-MEM-001
- STD-LOG-001
- STD-VER-001
- STD-TEST-001
- STD-REVIEW-001
- STD-ARCH-001
- STD-PERF-001
- STD-DOC-001
required_checklists:
- CL-INTAKE
- CL-DISCOVERY
- CL-ORCH
execution_sequence:
- PB-intake-classify
- H-INTAKE
- PB-discovery-research
- H-FRAME
- PB-draft-prd
- PB-draft-architecture
- H-PLAN
- PB-bootstrap-project
exit_criteria:
- INT.workflow_id = WF-PROJECT-NEW approved at H-INTAKE
- DISC approved at H-FRAME
- PRD + ARCH approved at H-PLAN
- Optional SCAFFOLD if bootstrap skill invoked
- ORS run_status = done
quality_gates:
- id: G-WF-01
  criterion: Spec and phases.yaml present
- id: G-WF-03
  criterion: H-PLAN terminal reachable
- id: G-WF-NEW-01
  criterion: PRD and ARCH artifacts linked in WR
failure_recovery:
- code: E-WF-PREFLIGHT
  trigger: Missing required input or artifact
  action: Human hold; list inputs.required
  rewind: null
- code: E-WF-GATE-REJECT
  trigger: Human reject at H-*
  action: ORS aborted or revise per gate
  rewind: prior phase
- code: E-WF-PLANNED
  trigger: Next skill status planned
  action: Block invoke; waiver or wait for promotion
  rewind: null
- code: E-WF-SKILL
  trigger: Playbook OUT-05 escalation
  action: ORCH recovery matrix; max 3 retries
  rewind: null
- code: E-WF-REWIND-DISC
  trigger: DISC requires_re_intake
  action: Rewind to Intake
  rewind: Intake
human_approval:
- gate_id: H-INTAKE
  binds:
  - INT
  required: true
  skippable: false
  waivable_via: gates.yaml#waivable_gates
- gate_id: H-FRAME
  binds:
  - DISC
  required: true
  skippable: false
  waivable_via: gates.yaml#waivable_gates
- gate_id: H-PLAN
  binds:
  - PRD
  - ARCH
  - SCAFFOLD
  required: true
  skippable: false
  waivable_via: gates.yaml#waivable_gates
