workflow_id: WF-BUGFIX
display_name: Bug Fix
aliases:
- Defect
- Hotfix path
class: end_to_end
version: 1.0.0
status: active
updated: '2026-06-18'
owner: Workflow Owner
intake_work_types:
- bugfix
phases_ref: ../WF-BUGFIX/phases.yaml
inputs:
  required:
  - id: IN-WF-01
    name: raw_request
    source: human
  - id: IN-WF-02
    name: project_root
    source: human
  optional:
  - id: IN-WF-10
    name: repro_steps
    source: human
  prerequisites: []
outputs:
  primary_artifacts:
  - INT
  - DIAG
  - ISS
  - CODE
  - TEST-RPT
  wr_terminal_status: verified
  ors_terminal_status: done
required_skills:
- skill_id: PB-intake-classify
  phase: Intake
  status_accept:
  - draft
  - active
  optional: false
- skill_id: PB-diagnose-bug
  phase: Plan
  status_accept:
  - planned
  - draft
  - active
  optional: true
- skill_id: PB-draft-issue
  phase: Plan
  status_accept:
  - planned
  - draft
  - active
  optional: false
- skill_id: PB-implement
  phase: Implement
  status_accept:
  - planned
  - draft
  - active
  optional: false
- skill_id: PB-verify
  phase: Verify
  status_accept:
  - planned
  - draft
  - active
  optional: false
required_templates:
- TP-intake
- TP-WR
- TP-testing
- TP-ORS
required_standards:
- STD-WF-001
- STD-ARTIFACT-001
- STD-NAMING-001
- STD-MEM-001
- STD-LOG-001
- STD-VER-001
- STD-TEST-001
- STD-REVIEW-001
- STD-ARCH-001
- STD-PERF-001
- STD-SEC-001
required_checklists:
- CL-INTAKE
- CL-ORCH
execution_sequence:
- PB-intake-classify
- H-INTAKE
- PB-diagnose-bug
- PB-draft-issue
- H-PLAN
- PB-implement
- H-IMPLEMENT
- PB-verify
- H-VERIFY
exit_criteria:
- H-VERIFY approve
- Repro resolved in TEST-RPT
- H-FRAME waived per gates.yaml
quality_gates:
- id: G-WF-BUG-01
  criterion: ISS links to DIAG when diagnose ran
failure_recovery:
- code: E-WF-PREFLIGHT
  trigger: Missing required input or artifact
  action: Human hold; list inputs.required
  rewind: null
- code: E-WF-GATE-REJECT
  trigger: Human reject at H-*
  action: ORS aborted or revise per gate
  rewind: prior phase
- code: E-WF-PLANNED
  trigger: Next skill status planned
  action: Block invoke; waiver or wait
  rewind: null
- code: E-WF-SKILL
  trigger: Playbook OUT-05 escalation
  action: ORCH recovery; max 3 retries
  rewind: null
human_approval:
- gate_id: H-INTAKE
  binds:
  - INT
  required: true
  skippable: false
  waivable_via: gates.yaml#waivable_gates
- gate_id: H-FRAME
  binds:
  - DISC
  required: true
  skippable: true
  waivable_via: gates.yaml#waivable_gates
- gate_id: H-PLAN
  binds:
  - ISS
  - DIAG
  required: true
  skippable: false
  waivable_via: gates.yaml#waivable_gates
- gate_id: H-IMPLEMENT
  binds:
  - CODE
  required: true
  skippable: true
  waivable_via: gates.yaml#waivable_gates
- gate_id: H-VERIFY
  binds:
  - TEST-RPT
  required: true
  skippable: false
  waivable_via: gates.yaml#waivable_gates
