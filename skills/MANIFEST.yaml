# AI Dev OS — bundled skills (SSOT: $AI_DEV_OS_HOME/skills/)
# install-cli.sh syncs these to ~/.grok/skills/ for slash-command discovery.
# Agents MUST load from $AI_DEV_OS_HOME/skills/<name>/SKILL.md — not external paths.

version: "1.0"

required:
  # OS bind + kickoff
  - setup-ads
  - setup-matt-pocock-skills
  - grill-me
  - grill-with-docs
  # Planning + issues
  - plan-to-issue-v2
  - grill-for-planning
  - plan-synthesis
  - plan-review
  - to-issues
  - to-prd
  # AFK execution
  - task-run
  - work-to-pr-v2
  - issue-processor
  - issue-spec-review
  - pr-readiness-check
  - tdd
  # Bug path
  - triage
  - diagnose