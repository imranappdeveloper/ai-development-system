# AI Dev OS — bundled skills (standalone SSOT)
# This file is the only skill registry. All skills live under skills/<name>/.
# install-cli.sh syncs to ~/.grok/skills/ for slash-command discovery only.
# Agents MUST load: $AI_DEV_OS_HOME/skills/<name>/SKILL.md
# See docs/STANDALONE.md

version: "1.0"

required:
  # OS bind + kickoff
  - setup-ads
  - setup-project-agents
  - grill-me
  - grill-with-docs
  # Planning + issues
  - plan-to-issue-v2
  - grill-for-planning
  - plan-synthesis
  - plan-review
  - to-issues
  - to-prd
  # AFK execution
  - task-run
  - work-to-pr-v2
  - issue-processor
  - issue-spec-review
  - pr-readiness-check
  - tdd
  # Bug path
  - triage
  - diagnose